<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Calculadora de costo impresión 3D en CLP">
  <defs>
    <radialGradient id="bg" cx="12%" cy="18%" r="120%">
      <stop offset="0%" stop-color="rgba(124,92,255,0.45)"/>
      <stop offset="55%" stop-color="rgba(11,16,32,1)"/>
      <stop offset="100%" stop-color="rgba(11,16,32,1)"/>
    </radialGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#23c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="rgba(0,0,0,0.55)"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="92" width="1040" height="446" rx="32" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
  </g>

  <circle cx="1010" cy="156" r="54" fill="url(#acc)" opacity="0.95"/>

  <text x="140" y="210" fill="rgba(255,255,255,0.94)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="54" font-weight="800">
    Calculadora costo impresión 3D (CLP)
  </text>
  <text x="140" y="270" fill="rgba(255,255,255,0.72)" font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="28" font-weight="600">
