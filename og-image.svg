  </text>

  <g transform="translate(140,320)" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="170" height="170" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.16)"/>
    <path d="M38 54h94"/>
    <path d="M38 96h26"/>
    <path d="M76 96h26"/>
    <path d="M114 96h26"/>
    <path d="M38 134h26"/>
    <path d="M76 134h26"/>
    <path d="M114 134h26"/>
